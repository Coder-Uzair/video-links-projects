<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>

    <link rel="stylesheet" href="Form.css">

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css">
</head>
<body>
    <div class="Uzair-profile">
        <div class="image">
            <img src="Uzair.JPEG" alt="" class="Uzair-profile">
        </div>

        <div class="text-data">
            <span class="name">Singing Lab</span>
            <span class="job">Programmer & Coder</span>
        </div>

        <div class="media-buttons">
            <a href="#" style="background: #4267b2;" class="link">
                <i class="bx bxl-facebook"></i>
            </a>

             <a href="#" style="background: #1da1f2;" class="link">
                <i class="bx bxl-twitter"></i>
            </a>
             <a href="#" style="background: #e1306c;" class="link">
                <i class="bx bxl-instagram"></i>
            </a>
             <a href="#" style="background: #ff0000;" class="link">
                <i class="bx bxl-youtube"></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="bx bx-heart" ></i>
                <span class="number">93k</span>
            </div>

            <div class="data">
                <i class="bx bx-message-rounded" ></i>
                <span class="number">43k</span>
            </div>

            <div class="data">
                <i class="bx bx-share" ></i>
                <span class="number">83k</span>
            </div>

        </div>
    </div>
</body>
</html>
