<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit card UI Desigin</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="logo.png" alt="">
                <h5>Master Card</h5>
            </span>
            <img src="chip.png" alt="" class="chip">
        </header>
        <div class="card-details">
            <div class="name-number">
                <h6 class="card">Card Number</h6>
                <h5 class="number">1893 9438 9281 2006</h5>
                <h5 class="name">Uzair Ahmed Yar</h5>
            </div>
            <div class="valid-date">
                <h6>Valid Thru</h6>
                <h5 class="date">10/29</h5>
            </div>
        </div>
    </div>
</body>
</html>
